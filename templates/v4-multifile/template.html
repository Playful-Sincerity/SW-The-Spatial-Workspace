<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spatial Workspace</title>
<style>
/* __APP_CSS__ */
</style>
<style>
/* __HLJS_THEME__ */
</style>
<style>
.sw-reader-content pre.sw-code { margin: 0; padding: 14px 16px; background: #1f2329; border-radius: 6px; overflow-x: auto; font-size: 12.5px; line-height: 1.5; }
.sw-reader-content pre.sw-code code.hljs { background: transparent; padding: 0; font-family: "SF Mono", "JetBrains Mono", Menlo, Monaco, Consolas, monospace; }
</style>
</head>
<body>

<div class="sw-header">
  <h1 id="sw-title">Spatial Workspace</h1>
  <span class="subtitle" id="sw-subtitle">Spatial Workspace</span>
  <div class="sw-search-box">
    <svg class="sw-search-icon" viewBox="0 0 24 24" aria-hidden="true">
      <circle cx="11" cy="11" r="6" fill="none" stroke="currentColor" stroke-width="1.5"/>
      <line x1="16" y1="16" x2="20" y2="20" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <span class="sw-search-scope" id="search-scope" hidden>
      <span class="sw-search-scope-label" id="search-scope-label"></span>
      <button class="sw-search-scope-clear" id="search-scope-clear" type="button" title="Remove folder scope" aria-label="Remove folder scope">
        <svg viewBox="0 0 12 12" aria-hidden="true">
          <line x1="3" y1="3" x2="9" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="9" y1="3" x2="3" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </span>
    <input type="text" id="search-input" placeholder="Search the canvas" />
    <button class="sw-search-clear" id="search-clear" type="button" title="Clear search" aria-label="Clear search">
      <svg viewBox="0 0 16 16" aria-hidden="true">
        <line x1="4" y1="4" x2="12" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="12" y1="4" x2="4" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
  <button class="sw-header-btn" id="tier-minus-btn" title="Hide deepest tier" aria-label="Hide deepest tier">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <line x1="6" y1="8" x2="18" y2="8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="8" y1="13" x2="16" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="16" y1="18" x2="20" y2="18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </button>
  <button class="sw-header-btn" id="tier-plus-btn" title="Reveal next tier" aria-label="Reveal next tier">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <line x1="6" y1="6" x2="18" y2="6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="8" y1="11" x2="16" y2="11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="14" y1="18" x2="22" y2="18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="18" y1="14" x2="18" y2="22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </button>
  <button class="sw-header-btn" id="tree-lines-btn" title="Hide parent-child tree lines" aria-label="Toggle tree lines">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <circle cx="12" cy="5" r="1.8" fill="none" stroke="currentColor" stroke-width="1.5"/>
      <circle cx="6" cy="18" r="1.8" fill="none" stroke="currentColor" stroke-width="1.5"/>
      <circle cx="18" cy="18" r="1.8" fill="none" stroke="currentColor" stroke-width="1.5"/>
      <path d="M11 6.5L7 16.5M13 6.5L17 16.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
    </svg>
  </button>
  <button class="sw-header-btn" id="cross-links-btn" title="Show cross-links between folders" aria-label="Toggle cross-links">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <circle cx="7" cy="12" r="2.3" fill="none" stroke="currentColor" stroke-width="1.5"/>
      <circle cx="17" cy="12" r="2.3" fill="none" stroke="currentColor" stroke-width="1.5"/>
      <path d="M9 12h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M5.5 8.5c-1.5 0.8-2.5 2.3-2.5 4.2M18.5 15.5c1.5-0.8 2.5-2.3 2.5-4.2" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.5" stroke-linecap="round"/>
    </svg>
  </button>
  <button class="sw-header-btn" id="expand-all-btn" title="Show the whole ecosystem (⌘E)" aria-label="Show the whole ecosystem">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <circle cx="12" cy="12" r="1.8" fill="currentColor"/>
      <circle cx="4.5" cy="12" r="1.4" fill="currentColor"/>
      <circle cx="19.5" cy="12" r="1.4" fill="currentColor"/>
      <circle cx="12" cy="4.5" r="1.4" fill="currentColor"/>
      <circle cx="12" cy="19.5" r="1.4" fill="currentColor"/>
      <circle cx="6.8" cy="6.8" r="1.1" fill="currentColor"/>
      <circle cx="17.2" cy="6.8" r="1.1" fill="currentColor"/>
      <circle cx="6.8" cy="17.2" r="1.1" fill="currentColor"/>
      <circle cx="17.2" cy="17.2" r="1.1" fill="currentColor"/>
    </svg>
  </button>
  <button class="sw-header-btn" id="settings-btn" title="Display settings" aria-label="Display settings">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <circle cx="6" cy="12" r="1.6" fill="currentColor"/>
      <circle cx="12" cy="12" r="1.6" fill="currentColor"/>
      <circle cx="18" cy="12" r="1.6" fill="currentColor"/>
    </svg>
  </button>
  <span class="sw-stats" id="stats">
    <span class="sw-live-dot" id="live-dot" title="Live updates not connected"></span>
    <span id="stats-text"></span>
  </span>
</div>

<div class="sw-settings-panel" id="settings-panel">
  <h3>Display</h3>
  <div class="sw-settings-row">
    <label>Ring spacing <span class="value" id="set-ringSpacing-val"></span></label>
    <input type="range" id="set-ringSpacing" min="60" max="800" step="10" />
  </div>
  <div class="sw-settings-row">
    <label>Leaf spacing <span class="value" id="set-leafArc-val"></span></label>
    <input type="range" id="set-leafArc" min="4" max="120" step="2" />
  </div>
  <div class="sw-settings-row">
    <label>Click target <span class="value" id="set-hitRadius-val"></span></label>
    <input type="range" id="set-hitRadius" min="4" max="50" step="1" />
  </div>
  <div class="sw-settings-row">
    <label>Label scale <span class="value" id="set-labelScale-val"></span></label>
    <input type="range" id="set-labelScale" min="0.7" max="1.6" step="0.05" />
  </div>
  <button class="sw-settings-reset" id="set-reset">Reset to defaults</button>
</div>

<div class="sw-main">
  <div class="sw-canvas" id="canvas"></div>
  <div class="sw-divider" id="divider"></div>
  <div class="sw-reader" id="reader">
    <div class="sw-tabs" id="tab-strip"></div>
    <div class="sw-reader-header">
      <button class="sw-reader-close" id="reader-close" title="Minimize (click outside also works · Esc)" aria-label="Minimize reader">
        <svg viewBox="0 0 12 16" aria-hidden="true">
          <path d="M 2 3 L 9 8 L 2 13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div style="flex:1; min-width:0;">
        <div class="filename" id="reader-filename">No file selected</div>
        <div class="filepath" id="reader-filepath"></div>
      </div>
      <button class="sw-reader-btn" id="go-to-canvas" title="Show in canvas" aria-label="Show in canvas">
        <svg viewBox="0 0 18 18" aria-hidden="true">
          <circle cx="9" cy="9" r="5.5" fill="none" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="9" cy="9" r="1.3" fill="currentColor"/>
          <line x1="9" y1="1.5" x2="9" y2="4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="9" y1="14" x2="9" y2="16.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="1.5" y1="9" x2="4" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="14" y1="9" x2="16.5" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
      <button class="sw-copy-path" id="copy-path" title="Copy file path" aria-label="Copy path">
        <svg viewBox="0 0 18 18" aria-hidden="true">
          <rect x="3" y="2" width="10" height="12" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/>
          <rect x="6" y="5" width="10" height="12" rx="2" fill="var(--sw-surface)" stroke="currentColor" stroke-width="1.5"/>
        </svg>
      </button>
    </div>
    <div class="sw-reader-content" id="reader-content">
      <div class="sw-reader-empty">Click a .md file to view its contents</div>
    </div>
  </div>
</div>

<div class="sw-open-files" id="open-files" role="region" aria-label="Open files">
  <div class="sw-open-files-header">OPEN FILES</div>
  <div class="sw-open-files-list" id="open-files-list"></div>
</div>

<div class="sw-legend" id="legend" aria-label="Last edited">
  <span class="sw-legend-title">EDITED</span>
  <span class="sw-legend-chip"><span class="sw-legend-dot" style="background: var(--sw-heat-blaze);"></span>Today</span>
  <span class="sw-legend-chip"><span class="sw-legend-dot" style="background: var(--sw-heat-hot);"></span>Last 3 days</span>
  <span class="sw-legend-chip"><span class="sw-legend-dot" style="background: var(--sw-heat-warm);"></span>Last week</span>
  <span class="sw-legend-chip"><span class="sw-legend-dot" style="background: var(--sw-heat-cool);"></span>Last 2 weeks</span>
  <span class="sw-legend-chip"><span class="sw-legend-dot" style="background: var(--sw-heat-cold);"></span>Last month</span>
  <span class="sw-legend-chip"><span class="sw-legend-dot" style="background: transparent; border: 1px solid rgba(237,229,213,0.25);"></span>Older / unknown</span>
</div>

<div class="sw-tooltip" id="tooltip"></div>
<div class="sw-context-menu" id="context-menu" role="menu" aria-hidden="true"></div>

<!-- Libraries (inlined by generator) -->

<script>/* __CONFIG__ */</script>
<script>/* __ECOSYSTEM_DATA__ */</script>

</body>
</html>

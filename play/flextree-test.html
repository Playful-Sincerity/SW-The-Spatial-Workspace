// ── Flextree algorithm (van der Ploeg non-layered tidy tree) ─────────
// Minimal inline implementation — no external dependency.
// Places children directly below parent at variable spacing.
// Guarantees zero crossings for any tree.

function flextreeLayout(root) {
  const GAP_X = 14;
  const GAP_Y = 20;

  // Phase 1: bottom-up — compute each subtree's width
  root.eachAfter(d => {
    if (!d.children || !d.children.length) {
      d._subtreeW = d._w;
      d._subtreeH = d._h;
    } else {
      let totalW = 0;
      let maxH = 0;
      for (const c of d.children) {
        if (totalW > 0) totalW += GAP_X;
        totalW += c._subtreeW;
        maxH = Math.max(maxH, c._subtreeH);
      }
      d._subtreeW = Math.max(d._w, totalW);
      d._subtreeH = d._h + GAP_Y + maxH;
    }
  });

  // Phase 2: top-down — assign positions
  root.x = 0;
  root.y = 0;
  root.each(d => {
    if (!d.children || !d.children.length) return;
    let cursor = d.x - d._subtreeW / 2 + d._w / 2;
    // If parent is wider than children total, center children under parent
    const childrenTotalW = d.children.reduce((s, c, i) => s + c._subtreeW + (i > 0 ? GAP_X : 0), 0);
    if (childrenTotalW < d._subtreeW) {
      cursor = d.x - childrenTotalW / 2;
    } else {
      cursor = d.x - d._subtreeW / 2;
    }
    for (const c of d.children) {
      c.x = cursor + c._subtreeW / 2;
      c.y = d.y + d._h + GAP_Y;
      cursor += c._subtreeW + GAP_X;
    }
  });
}

// ── Measurement ──────────────────────────────────────────────────────
const _mc = document.createElement("canvas").getContext("2d");

function measure(d) {
  const isRoot = d.depth === 0;
  const isDir = d.data.type === "dir";
  const fontSize = isRoot ? 14 : (isDir ? 12 : 11);
  const padX = isRoot ? 18 : (isDir ? 14 : 12);
  const minW = isRoot ? 200 : (isDir ? 100 : 80);
  const h = isRoot ? 40 : (isDir ? 30 : 26);

  _mc.font = `${isRoot ? 700 : isDir ? 600 : 500} ${fontSize}px -apple-system, sans-serif`;
  const label = d.data.name + (isDir && d.data.children && !expanded.has(d.data) ? ` (${d.data.children.length})` : "");
  const textW = _mc.measureText(label).width;
  d._w = Math.min(260, Math.max(minW, Math.ceil(textW + padX * 2)));
  d._h = h;
  d._label = label;
}

// ── State ────────────────────────────────────────────────────────────
const expanded = new Set();
expanded.add(TREE); // root starts expanded

function getVisibleTree(node) {
  const clone = { name: node.name, type: node.type, _src: node, children: undefined };
  if (node.type === "dir" && expanded.has(node) && node.children) {
    clone.children = node.children.map(c => getVisibleTree(c));
  }
  return clone;
}

// ── Render ───────────────────────────────────────────────────────────
const svg = d3.select("#canvas");
const width = window.innerWidth, height = window.innerHeight;
svg.attr("viewBox", `0 0 ${width} ${height}`);

const zoomG = svg.append("g");
const contentG = zoomG.append("g");

const zoom = d3.zoom().scaleExtent([0.05, 4]).on("zoom", e => {
  zoomG.attr("transform", e.transform);
});
svg.call(zoom);

function render() {
  const vis = getVisibleTree(TREE);
  const root = d3.hierarchy(vis);
  root.each(d => measure(d));
  flextreeLayout(root);

  const descendants = root.descendants();
  const links = root.links();

  // Center content
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  for (const d of descendants) {
    minX = Math.min(minX, d.x - d._w/2);
    maxX = Math.max(maxX, d.x + d._w/2);
    minY = Math.min(minY, d.y);
    maxY = Math.max(maxY, d.y + d._h);
  }
  const cx = (minX + maxX) / 2;
  const cy = (minY + maxY) / 2;
  contentG.attr("transform", `translate(${width/2 - cx}, ${60 - minY})`);

  // Links
  const linkSel = contentG.selectAll(".link").data(links, d => d.target.data.name + d.target.depth);
  linkSel.exit().remove();
  const linkEnter = linkSel.enter().append("path").attr("class", "link");
  linkEnter.merge(linkSel).transition().duration(300)
    .attr("d", d => {
      const sx = d.source.x, sy = d.source.y + d.source._h;
      const tx = d.target.x, ty = d.target.y;
      const my = (sy + ty) / 2;
      return `M${sx},${sy} C${sx},${my} ${tx},${my} ${tx},${ty}`;
    });

  // Nodes
  const nodeSel = contentG.selectAll(".node").data(descendants, d => d.data.name + d.depth);
  nodeSel.exit().remove();
  const nodeEnter = nodeSel.enter().append("g")
    .attr("class", d => "node " + (d.depth === 0 ? "root" : d.data.type === "dir" ? "dir" : "file"));
  nodeEnter.append("rect");
  nodeEnter.append("text").attr("text-anchor", "middle").attr("dominant-baseline", "central");

  const nodeUpdate = nodeEnter.merge(nodeSel);
  nodeUpdate.transition().duration(300)
    .attr("transform", d => `translate(${d.x},${d.y})`);

  nodeUpdate.select("rect")
    .attr("x", d => -d._w / 2)
    .attr("width", d => d._w)
    .attr("height", d => d._h);

  nodeUpdate.select("text")
    .attr("y", d => d._h / 2)
    .text(d => d._label)
    .style("font-size", d => d.depth === 0 ? "14px" : d.data.type === "dir" ? "12px" : "11px");

  // Click handler
  nodeUpdate.on("click", (e, d) => {
    if (d.data.type !== "dir" || !d.data._src.children) return;
    if (expanded.has(d.data._src)) {
      expanded.delete(d.data._src);
    } else {
      expanded.add(d.data._src);
    }
    render();
  });

  // Info
  const nodeCount = descendants.length;
  document.getElementById("info").textContent =
    `${nodeCount} nodes · Click folders to expand/collapse · Zero edge crossings guaranteed`;

  // Fit to view on first render
  if (descendants.length <= 5) {
    const scale = Math.min(1, width / (maxX - minX + 100), height / (maxY - minY + 100));
    svg.call(zoom.transform, d3.zoomIdentity.translate(width/2, height/2).scale(scale).translate(-cx, -cy));
  }
}

render();
